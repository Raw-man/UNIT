name: Linux Build

on:
  push:
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - '.github/workflows/linux.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - '.github/workflows/linux.yml'

jobs:
  linux-build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang \
            libmpg123-dev \
            libmp3lame-dev \
            autoconf \
            automake \
            libtool \
            libltdl-dev \
            zip
      - name: Build Static libmpg123
        run: |
          git clone https://github.com/libsdl-org/mpg123
          cd mpg123
          autoreconf -vif 
          ./configure --enable-static=yes --enable-shared=no --with-cpu=x86-64
          make -j$(nproc)
          # We don't 'make install' to avoid messing with system paths; 
          # we will point CMake to this folder instead.
          echo "MPG123_PATH=$(pwd)" >> $GITHUB_ENV

      - name: Configure and Build
        run: |
          # Point CMake to your manually built static library and headers
          cmake -S . -B build -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -Dmpg123_INCLUDE_DIR="${{ env.MPG123_PATH }}/src/libmpg123" \
            -Dmpg123_LIBRARY="${{ env.MPG123_PATH }}/src/libmpg123/.libs/libmpg123.a" \
            -DMP3LAME_LIBRARY="/usr/lib/x86_64-linux-gnu/libmp3lame.a"
          cmake --build build --parallel

      - name: Prepare for Release
        run: |
          cd build
          zip UNIT-linux-x64.zip unit
          echo "ZIP_PATH=build/UNIT-linux-x64.zip" >> $GITHUB_ENV

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
            name: UNIT-linux-bin
            path: ${{ env.ZIP_PATH }}

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
            files: ${{ env.ZIP_PATH }}
            generate_release_notes: true
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

